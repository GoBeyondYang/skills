name: Test

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "LICENSE"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff analysis in tests
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: cd skills/business-conflict-analyzer && python tests/run_all.py
